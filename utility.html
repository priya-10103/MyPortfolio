<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Utility App</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.hero {
    background: linear-gradient(135deg,#11998e,#38ef7d);
    color:white;
    padding:80px;
    text-align:center;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Student Utility App</h1>
    <p>All-in-one productivity tool</p>
</div>

<div class="container mt-5">

<h3>📌 About App</h3>
<p>This app helps students manage daily tasks easily.</p>

<h3 class="mt-4">✨ Features</h3>
<ul>
<li>To-Do List</li>
<li>Calculator</li>
<li>Notes Section</li>
</ul>

<!-- SIMPLE CALCULATOR -->
<div class="mt-4">
<h4>🧮 Calculator Demo</h4>
<input id="num1" placeholder="Number 1" class="form-control mb-2">
<input id="num2" placeholder="Number 2" class="form-control mb-2">
<button onclick="add()" class="btn btn-success">Add</button>
<p id="result" class="mt-2"></p>
</div>

<a href="index.html" class="btn btn-dark mt-4">⬅ Back</a>

</div>

<script>
function add(){
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    document.getElementById("result").innerText = "Result: " + (a+b);
}
</script>

</body>
</html>
