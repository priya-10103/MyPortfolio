<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
        }

        header {
            background: #333;
            color: white;
            padding: 20px;
        }

        section {
            padding: 20px;
        }

        .card {
            background: white;
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        footer {
            background: #333;
            color: white;
            padding: 10px;
        }

        h1, h2 {
            color: #333;
        }

        .highlight {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <h1>My Portfolio Website 🚀</h1>
    <p class="highlight">Deployed using Jenkins CI/CD</p>
</header>

<section>
    <div class="card">
        <h2>About Me</h2>
        <p>Hello! I am learning DevOps and CI/CD using Jenkins.</p>
    </div>

    <div class="card">
        <h2>Project</h2>
        <p>This project automatically updates using GitHub + Jenkins.</p>
    </div>

    <div class="card">
        <h2>Update Status</h2>
        <p class="highlight">Updated by Jenkins CI/CD ✅</p>
    </div>
</section>

<footer>
    <p>Last Updated: 2026</p>
</footer>

</body>
</html>
