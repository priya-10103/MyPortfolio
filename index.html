<!DOCTYPE html>
<html>
<head>
    <title>Student Utility App</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            text-align: center;
        }
        h1 {
            background: #333;
            color: white;
            padding: 15px;
        }
        .box {
            background: white;
            margin: 20px auto;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        input, button {
            padding: 10px;
            margin: 5px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: #eee;
            margin: 5px;
            padding: 5px;
        }
    </style>
</head>

<body>

<h1>Student Utility App 🚀</h1>

<div class="box">
    <h3>To-Do List</h3>
    <input type="text" id="task">
    <button onclick="addTask()">Add</button>
    <ul id="list"></ul>
</div>

<div class="box">
    <h3>Calculator</h3>
    <input type="number" id="num1">
    <input type="number" id="num2"><br>
    <button onclick="calc('+')">+</button>
    <button onclick="calc('-')">-</button>
    <button onclick="calc('*')">*</button>
    <button onclick="calc('/')">/</button>
    <p id="result"></p>
</div>

<div class="box">
    <h3>Notes</h3>
    <textarea id="note"></textarea><br>
    <button onclick="saveNote()">Save</button>
    <p id="saved"></p>
</div>

<script>
function addTask() {
    let task = document.getElementById("task").value;
    let li = document.createElement("li");
    li.innerText = task;
    document.getElementById("list").appendChild(li);
}

function calc(op) {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    let res;
    if(op=='+') res = a+b;
    if(op=='-') res = a-b;
    if(op=='*') res = a*b;
    if(op=='/') res = a/b;
    document.getElementById("result").innerText = "Result: " + res;
}

function saveNote() {
    let note = document.getElementById("note").value;
    document.getElementById("saved").innerText = "Saved: " + note;
}
</script>

</body>
</html>
